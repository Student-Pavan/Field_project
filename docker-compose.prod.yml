# Production Docker Compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  backend:
    environment:
      BACKEND_RELOAD: "false"
    volumes: []

  frontend:
    build:
      target: production
      args:
        VITE_API_BASE_URL: ""
        VITE_WS_BASE_URL: ""
    ports:
      - "80:80"
    volumes: []
